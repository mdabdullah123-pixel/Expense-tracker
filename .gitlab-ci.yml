stages:
  - lint
  - test
  - release

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  UV_CACHE_DIR: "$CI_PROJECT_DIR\\.cache\\uv"

cache:
  paths:
    - .cache/uv
    - .venv

before_script:
  - python --version
  - if (Test-Path .venv) { Remove-Item -Recurse .venv -Force }
  - python -m venv .venv
  - & .\.venv\Scripts\Activate.ps1
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt

format:
  stage: lint
  script:
    - python -m pip install ruff
    - python -m ruff format .
    
lint:
  stage: lint
  script:
    - python -m pip install ruff bandit pip-audit
    - python -m ruff check .
    - python -m bandit -r . -x tests,.venv
    - python -m pip_audit -r requirements.txt

type_check:
  stage: test
  script:
    - python -m pip install mypy types-requests
    - python -m mypy .

test:
  stage: test
  script:
    - python -m pytest --cov=. --cov-report=term-missing --cov-report=xml
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

coverage:
  stage: test
  script:
    - python -m pytest --cov=. --cov-report=xml
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml

release:
  stage: release
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - python -m pip install git-cliff
    - git-cliff --config cliff.toml
  allow_failure: true
